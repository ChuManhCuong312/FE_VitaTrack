# Deploy len Netlify
[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA / Multi-page: redirect cho tat ca route ve dung file
[[redirects]]
  from = "/pages/*"
  to   = "/pages/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Headers bao mat
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
