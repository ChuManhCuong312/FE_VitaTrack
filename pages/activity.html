<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoat Dong | VitaTrack</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/pages/activity.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="header" id="header"></header>
  <main class="main-content" id="mainContent">
    <div class="page-container fade-in">

      <div class="page-header flex items-center justify-between">
        <div>
          <h1 class="page-title">Hoat Dong The Chat</h1>
          <p class="page-subtitle">Theo doi luyen tap va ket noi thiet bi deo</p>
        </div>
        <button class="btn btn-primary" onclick="Modal.open('addActivityModal')">+ Ghi hoat dong</button>
      </div>

      <!-- Stats Row -->
      <div class="activity-stats-row" style="margin-bottom:24px">
        <div class="card stat-card">
          <div class="stat-icon blue">👟</div>
          <div class="stat-value" id="stat-steps-act">0</div>
          <div class="stat-label">Buoc chan hom nay</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon orange">🔥</div>
          <div class="stat-value" id="stat-burned">0 kcal</div>
          <div class="stat-label">Calo da dot</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon green">⏱️</div>
          <div class="stat-value" id="stat-duration">0 phut</div>
          <div class="stat-label">Thoi gian tap</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <!-- Activity list -->
        <div class="card">
          <div class="card-header" style="padding-bottom:16px;border-bottom:1px solid var(--border-color)">
            <span class="card-title">Hoat dong hom nay</span>
          </div>
          <div class="card-body" id="activityList">
            <div class="empty-state"><div class="empty-icon">🏃</div><div class="empty-text">Chua co hoat dong nao hom nay</div></div>
          </div>
        </div>

        <!-- Wearable devices -->
        <div class="card">
          <div class="card-header" style="padding-bottom:16px;border-bottom:1px solid var(--border-color)">
            <span class="card-title">Thiet bi deo</span>
          </div>
          <div class="card-body" id="wearableList"></div>
        </div>
      </div>

      <!-- Activity chart -->
      <div class="card" style="margin-top:24px">
        <div class="card-body">
          <div class="chart-title" style="margin-bottom:16px">Tong quan 7 ngay</div>
          <div style="height:220px"><canvas id="activityWeekChart"></canvas></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Activity Modal -->
<div class="modal-overlay" id="addActivityModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Ghi hoat dong moi</span>
      <span class="modal-close" onclick="Modal.close('addActivityModal')">x</span>
    </div>
    <div class="modal-body">
      <form id="addActivityForm">
        <div class="form-group">
          <label class="form-label">Loai hoat dong</label>
          <select id="actType" class="form-control">
            <option value="walking">Di bo</option>
            <option value="running">Chay bo</option>
            <option value="cycling">Dap xe</option>
            <option value="swimming">Boi loi</option>
            <option value="yoga">Yoga</option>
            <option value="gym">Gym / Tap ta</option>
            <option value="dancing">Khieu vu</option>
            <option value="basketball">Bong ro</option>
            <option value="football">Bong da</option>
            <option value="hiking">Leo nui</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Thoi luong (phut)</label>
            <input type="number" id="actDuration" class="form-control" placeholder="30" min="1" max="480">
          </div>
          <div class="form-group">
            <label class="form-label">Khoang cach (km)</label>
            <input type="number" id="actDistance" class="form-control" placeholder="0" min="0" step="0.1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Ghi chu</label>
          <input type="text" id="actNotes" class="form-control" placeholder="Ghi chu them...">
        </div>
        <div class="modal-footer" style="padding:0;margin-top:16px">
          <button type="button" class="btn btn-secondary" onclick="Modal.close('addActivityModal')">Huy</button>
          <button type="submit" class="btn btn-primary">Luu hoat dong</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import '../assets/js/main.js';
  import ManualActivity from '../assets/js/modules/activity/manualActivity.js';
  import WearableSync from '../assets/js/modules/activity/wearableSync.js';
  document.addEventListener('DOMContentLoaded', () => {
    ManualActivity.init();
    WearableSync.init();
  });
</script>
</body></html>
