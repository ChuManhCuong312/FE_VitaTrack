<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuyen Gia | VitaTrack</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/pages/assistant.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <header class="header" id="header"></header>
  <main class="main-content" id="mainContent">
    <div class="page-container fade-in">

      <div class="page-header">
        <h1 class="page-title">Cong cu Chuyen Gia</h1>
        <p class="page-subtitle">Quan ly khach hang, thuc don va tu van dinh duong</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="card stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-value">24</div>
          <div class="stat-label">Khach hang</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon green">📋</div>
          <div class="stat-value">12</div>
          <div class="stat-label">Thuc don dang dung</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon orange">⚠️</div>
          <div class="stat-value">3</div>
          <div class="stat-label">Canh bao rui ro</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon blue">💬</div>
          <div class="stat-value">8</div>
          <div class="stat-label">Tin nhan moi</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <!-- Client chat -->
        <div class="card" style="display:flex;flex-direction:column;height:480px">
          <div class="card-header" style="padding-bottom:16px;border-bottom:1px solid var(--border-color)">
            <span class="card-title">Tu van khach hang</span>
          </div>
          <div style="display:flex;flex:1;overflow:hidden">
            <!-- Client list -->
            <div style="width:160px;border-right:1px solid var(--border-color);padding:8px;overflow-y:auto" id="clientList">
              <div style="text-align:center;padding:20px;font-size:12px;color:var(--text-muted)">Dang tai...</div>
            </div>
            <!-- Chat area -->
            <div style="flex:1;display:flex;flex-direction:column">
              <div class="chat-messages" id="expertChatMessages" style="flex:1;border-radius:0;border:0">
                <div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">Chon khach hang de bat dau</div></div>
              </div>
              <div class="chat-input-bar" style="border-radius:0;border-top:1px solid var(--border-color)">
                <textarea class="chat-input" id="expertChatInput" rows="1" placeholder="Nhap tin nhan..."></textarea>
                <button class="btn btn-expert btn-sm" id="expertSendBtn">Gui</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Meal plans -->
        <div class="card">
          <div class="card-header flex items-center justify-between" style="padding-bottom:16px;border-bottom:1px solid var(--border-color)">
            <span class="card-title">Thuc don da tao</span>
            <button class="btn btn-expert btn-sm" onclick="Modal.open('createMealPlanModal')">+ Tao moi</button>
          </div>
          <div class="card-body" id="mealPlanList">
            <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Chua co thuc don nao</div></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Create Meal Plan Modal -->
<div class="modal-overlay" id="createMealPlanModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Tao thuc don moi</span>
      <span class="modal-close" onclick="Modal.close('createMealPlanModal')">x</span>
    </div>
    <div class="modal-body">
      <form id="createMealPlanForm">
        <div class="form-group">
          <label class="form-label">Ten thuc don</label>
          <input type="text" id="planTitle" class="form-control" placeholder="Vi du: Thuc don giam can tuan 1">
        </div>
        <div class="form-group">
          <label class="form-label">ID Khach hang</label>
          <input type="text" id="planClientId" class="form-control" placeholder="Nhap ID khach hang">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">So ngay</label>
            <input type="number" id="planDuration" class="form-control" value="7" min="1" max="90">
          </div>
          <div class="form-group">
            <label class="form-label">Muc tieu calo/ngay</label>
            <input type="number" id="planCalories" class="form-control" value="1800" min="1000" max="5000">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Ghi chu</label>
          <textarea id="planNotes" class="form-control" rows="3" placeholder="Ghi chu them cho thuc don..."></textarea>
        </div>
        <div class="modal-footer" style="padding:0;margin-top:16px">
          <button type="button" class="btn btn-secondary" onclick="Modal.close('createMealPlanModal')">Huy</button>
          <button type="submit" class="btn btn-expert">Tao thuc don</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import '../assets/js/main.js';
  import ExpertChat from '../assets/js/modules/expert/expertChat.js';
  import MealPlan from '../assets/js/modules/expert/mealPlan.js';
  document.addEventListener('DOMContentLoaded', () => {
    ExpertChat.init();
    MealPlan.init();
  });
</script>
</body></html>
