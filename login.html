<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dang nhap | VitaTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/login.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🌿</div>
      <div class="auth-logo-text">VitaTrack</div>
    </div>

    <h1 class="auth-title">Chao mung tro lai</h1>
    <p class="auth-subtitle">Dang nhap de tiep tuc theo doi suc khoe</p>

    <div class="alert-error" id="errorAlert">
      <span id="errorText"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="email@example.com" autocomplete="email">
      <div class="form-error" id="emailErr">Vui long nhap email hop le.</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">
        Mat khau
        <a href="forgot-password.html" style="float:right;font-size:var(--font-size-xs);color:var(--color-primary-deep);text-decoration:none">Quen mat khau?</a>
      </label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="form-error" id="passwordErr">Vui long nhap mat khau.</div>
    </div>

    <button class="btn-auth" id="loginBtn">Dang nhap</button>

    <div class="auth-footer" style="margin-top:var(--space-5)">
      Chua co tai khoan? <a href="register.html">Dang ky mien phi</a>
    </div>
  </div>
</div>

<script type="module">
  import Auth from './assets/js/core/auth.js';
  import api  from './assets/js/core/api.js';
  import Toast from './assets/js/components/toast.js';

  // Neu da dang nhap, chuyen huong
  Auth.redirectIfLoggedIn();

  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorDiv = document.getElementById('errorAlert');
  const errorTxt = document.getElementById('errorText');

  function showError(msg) {
    errorTxt.textContent = msg;
    errorDiv.classList.add('visible');
  }
  function hideError() { errorDiv.classList.remove('visible'); }

  async function handleLogin() {
    hideError();
    const email    = emailEl.value.trim();
    const password = passEl.value;
    let valid = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('emailErr').classList.add('visible');
      emailEl.classList.add('error');
      valid = false;
    } else {
      document.getElementById('emailErr').classList.remove('visible');
      emailEl.classList.remove('error');
    }
    if (!password) {
      document.getElementById('passwordErr').classList.add('visible');
      passEl.classList.add('error');
      valid = false;
    } else {
      document.getElementById('passwordErr').classList.remove('visible');
      passEl.classList.remove('error');
    }
    if (!valid) return;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Dang nhap...';

    try {
      const data = await api.post('/auth/login', { email, password });
      Auth.saveSession(data);
      // Chuyen huong theo role
      const dest = data.role === 'admin' ? '/pages/admin.html'
                 : data.role === 'expert' ? '/pages/expert.html'
                 : '/pages/dashboard.html';
      window.location.href = dest;
    } catch (err) {
      showError(err.message || 'Dang nhap that bai. Kiem tra lai email va mat khau.');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Dang nhap';
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  [emailEl, passEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  });
</script>
</body>
</html>
